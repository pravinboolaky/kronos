<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon-32.png" />
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>CHRONOMÈTRE FFTA</title>
</head>

<body>
  <div id="container">
    <div id="display">
      <div id="chrono">
        <div id="team"></div>
        <div id="step"></div>
        <div id="time"></div>
      </div>
      <div id="actions">
        <button id="chrono-btn" onclick="onToggleChronoButton()">
          <img id="chrono-btn-img">
        </button>
      </div>
    </div>
    <div id="panel">
      <h1 id="title">Chrono FFTA 🇫🇷</h1>
      <p>Chronomètre d'entraînement basé sur la réglementation FFTA<br> pour le tir Arc Classique et Arc à Poulie.</p>
      <div id="form">
        <fieldset>
          <legend>TIR</legend>
          <select id="modeSelect">
            <optgroup label="Tir individuel">
              <option value="0">6 flèches / 240s</option>
              <option value="1">3 Flèches / 120s</option>
              <option value="2">1 Flèche / 20s</option>
            </optgroup>

            <optgroup label="Tir d'équipe (3 Archers)">
              <option value="3">3 archers / 6 flèches / 120s</option>
              <option value="4">3 archers / 3 flèches / 60s</option>
            </optgroup>
            <optgroup label="Tir d'équipe (2 Archers)">
              <option value="5">2 archers / 4 flèches / 80s</option>
            </optgroup>

          </select>
        </fieldset>
        <fieldset id="settings">
          <legend>SETTINGS</legend>
          <div>
            <input type="checkbox" id="disable-warmup" name="disable-warmup" onchange="onWarmupToggle()" />
            <label for="disable-warmup">Désactiver le pré-tir.</label>
          </div>
          <div>
            <input type="checkbox" id="enable-sound" name="enable-sound" onchange="onSoundToggle()" />
            <label for="enable-sound">Activer les signaux sonores.</label>
          </div>
        </fieldset>
        <button id="form-btn" onclick="onResetBtn()">NOUVEAU DÉPART</button>
      </div>
      <div>Made in Paris with ❤️ by <a target="_blank" href="https://www.linkedin.com/in/pravinboolaky/">Pravin
          Boolaky</a></div>
    </div>
  </div>
  <audio id="beep">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>
  <script async="true" src="app.js"></script>
</body>

</html>
