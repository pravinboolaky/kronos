<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon-32.png" />
  <link rel="manifest" href="/kronos/manifest.json">
  <script src="/kronos/app.js"></script>
  <title>FFTA – Timer avec choix</title>
  <style>
    @font-face {
      font-family: LCD;
      src: url('digital-7.ttf');
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #111;
      color: white;
      height: 100%;
      overflow: scroll;
    }

    #container {
      height: 100%;
    }

    #panel {
          position: absolute;
    bottom: 0;
    width: 100%;
    }

    #display {

        display: flex;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: center;
    align-content: center;
    flex-direction: row;
  }

    #step {
      font-size: 40px;
      margin-bottom: 20px;
      flex: 1;

    }

    #team {
      font-size: 120px;
      flex: 1;

    }

    #time {
      font-size: 240px;
      font-weight: bold;
      padding: 20px;
      border-radius: 20px;
      background: #222;
      margin-bottom: 20px;
      color: #0f0;
      flex: 2;
    }

    select,
    button {
    padding: 16px;
    font-size: 20px;
    margin: 8px;
    background-color: #111;
    border: 1px solid #333;
    color: white;
    border-radius: 8px;
    }

    

    button {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

        #board {
      width: 100%;
      height: 100%;
    }


  </style>
</head>

<body>

  <div id="container">


    <div id="board">

      <div id="display">
        <div>
      <div id="team"></div>
      <div id="step"></div>

        </div>
      <div id="time"></div>
      </div>



      <div>
        <button id="timer-btn" onclick="onToggleChronoButton()"></button>
      </div>


    </div>

    <div id="panel">



      <!-- Liste déroulante -->
      <select id="modeSelect">
        <option value="0">FFTA – TAE (10s - 240 s)</option>
        <option value="1">FFTA – MIXTE (10s - 80 s)</option>
        </label>
      </select>

      <select id="sequenceSelect">
        <option value="SOLO">SOLO</option>
        <option value="ABCD">AB > CD </option>
        <option value="CDAB">CD > AB</option>
        </label>
      </select>

      <button onclick="onResetBtn()">APPLIQUER</button>


      <div>
        <input type="checkbox" id="horns" name="horns" />
        <label for="horns">Désactiver temps préparation</label>
      </div>

      <div>
              <h1>⏱ Chrono FFTA 🇫🇷</h1>
              <p>Made from Paris with love ❤️ @ Copyright Pravin Boolaky</p>
      </div>

    </div>


  </div>




  <audio id="beep">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>


  <script>

    const chronoStateReset = 1;
    const chronoStateRunning = 2;
    const chronoStatePaused = 3;
    const chronoStateTimeOut = 4;
    let chronoState = chronoStateReset;

    let interval;
    let selectedMode = null;
    let selectedSequence = null;
    let currentSequenceIndex = 0;

    let modes = [
      { label: "FFTA_6ARROWS", readyTime: 2, shootTime: 3 },
      { label: "FFTA_6ARROWS", readyTime: 2, shootTime: 3 }
    ];

    let timeLeft = 0;

    function refreshDisplay() {

      console.log("updateDisplay");
      let teamHtml = document.getElementById("team");
      let stepHtml = document.getElementById("step");
      let timeHtml = document.getElementById("time");
      let chronoBtnHtml = document.getElementById("timer-btn");

      if (chronoState === chronoStateReset) { // Démarrer
        timeHtml.textContent = selectedSequence[currentSequenceIndex].time;
        teamHtml.innerHTML = selectedSequence[currentSequenceIndex].team;
        stepHtml.textContent = selectedSequence[currentSequenceIndex].step;
        chronoBtnHtml.textContent = "DÉMARRER";
      }
      else if (chronoState === chronoStatePaused) { // Pause
        timeHtml.textContent = timeLeft;
        teamHtml.innerHTML = selectedSequence[currentSequenceIndex].team;
        stepHtml.textContent = selectedSequence[currentSequenceIndex].step;
        chronoBtnHtml.textContent = "REPRENDRE";
      }
      else if (chronoState === chronoStateRunning) { // Continue
        timeHtml.textContent = timeLeft;
        teamHtml.innerHTML = selectedSequence[currentSequenceIndex].team;
        stepHtml.textContent = selectedSequence[currentSequenceIndex].step;
        chronoBtnHtml.textContent = "PAUSE";
      }
      else if (chronoState === chronoStateTimeOut) { // Relancer
        timeHtml.textContent = "X";
        teamHtml.innerHTML = selectedSequence[currentSequenceIndex].team;
        stepHtml.textContent = selectedSequence[currentSequenceIndex].step;
        chronoBtnHtml.textContent = "RELANCER";
      }
    }



    function runChrono() {

      if (interval) return;

      updateChronoStateTo(chronoStateRunning);
      refreshDisplay();

      interval = setInterval(() => {

        if (timeLeft > 0) {
          timeLeft--;
          updateChronoStateTo(chronoStateRunning);

        } else {

          //document.getElementById("beep").play();


          if (currentSequenceIndex + 1 >= selectedSequence.length) { // end of sequence
            updateChronoStateTo(chronoStateTimeOut);
            destroyInterval();
          } else { // next sequence step
            currentSequenceIndex++;
            timeLeft = selectedSequence[currentSequenceIndex].time;
          }

        }

        refreshDisplay();


      }, 1000);


    }

    function pauseChrono() {
      destroyInterval();
      updateChronoStateTo(chronoStatePaused)
      refreshDisplay();
    }

    function resetChrono() {

      destroyInterval();

      let selectedModeIndex = parseInt(document.getElementById("modeSelect").value);
      let selectedSequenceValue = document.getElementById("sequenceSelect").value;

      selectedMode = modes[selectedModeIndex];
      let readyTime = selectedMode.readyTime;
      let shootTime = selectedMode.shootTime;

      switch (selectedSequenceValue) {
        case "SOLO":
          selectedSequence = [
            { team: "A", step: "PREPA.", time: readyTime },
            { team: "A", step: "TIR", time: shootTime }
          ]
          break;
        case "ABCD":
          selectedSequence = [
            { team: "A</br>B", step: "PREPA", time: readyTime },
            { team: "A</br>B", step: "TIR", time: shootTime },
            { team: "C</br>D", step: "PREPA", time: readyTime },
            { team: "C</br>D", step: "TIR", time: shootTime }
          ]
          break;
        case "CDAB":
          selectedSequence = [
            { team: "C</br>D", step: "PREPA", time: readyTime },
            { team: "C</br>D", step: "TIR", time: shootTime },
            { team: "A</br>B", step: "PREPA", time: readyTime },
            { team: "A</br>B", step: "TIR", time: shootTime }
          ]
          break;
      }

      timeLeft = selectedMode.readyTime;
      currentSequenceIndex = 0;
      updateChronoStateTo(chronoStateReset);
      refreshDisplay();
    }

    function destroyInterval() {
      clearInterval(interval);
      interval = null;
    }


    function updateChronoStateTo(status) {
      chronoState = status;
    }

    function onResetBtn() {
      resetChrono();
    }

    function onToggleChronoButton() {

      if (chronoState === chronoStateReset) { // Démarrer
        runChrono();
      }
      else if (chronoState === chronoStatePaused) { // Continuer
        runChrono();
      }
      else if (chronoState === chronoStateRunning) { // Pause
        pauseChrono();
      }
      else if (chronoState === chronoStateTimeOut) { // Relancer
        resetChrono();
        runChrono();
      }
    }

    resetChrono();

  </script>

</body>

</html>
