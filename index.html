<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon-32.png" />
  <link rel="manifest" href="/kronos/manifest.json">
  <script src="/kronos/app.js"></script>
  <title>FFTA – Timer avec choix</title>
  <style>
    @font-face {
      font-family: LCD;
      src: url('Montserrat.ttf');
    }

    @font-face {
      font-family: digit;
      src: url('monofonto.otf');
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: LCD;
    }

    html {
      height: 100%;
    }

    body {
      text-align: center;
      background-color: #111;
      color: white;
      height: 100%;
    }

    #container {
      height: 100%;
      overflow: scroll;
    }
    #chrono {
      width: 100%;
      height: 100%;
    }
    #display {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      align-content: center;
      flex-direction: row;
      height: 100%;
    }
    #step {
      font-size: 40px;
      margin-bottom: 20px;
      flex: 1;
    }
    #team {
      font-size: 120px;
      flex: 1;
            font-weight: bold;
    }
    #sequence {
      flex: 1;
            font-weight: bold;
                    letter-spacing: 4px;


    }
   #actions {
      flex: 1;
    }
    #time {
      font-size: 35vw;
      /* font-weight: bold; */
      color: #ffeb3b;
      flex: 2;
      font-family: digit;
    }
    #panel {
width: 100%;
height: 100%;
    padding: 60px 0px;
    background: #222;
    }

    fieldset{
    display: inline-block;
    border: 1px solid #666;
    border-radius: 0px 8px 8px;
    margin: 8px 0px;
    width: 100%;
    }
    legend {
font-size: 12px;
    padding: 0px 8px;
    text-align: left;    }

    select {
    font-size: 20px;
    margin: 8px;
    background-color: #222;
    border: none;
    color: white;
    border-radius: 8px;
    text-align: left;

    width: 90%;
    }
    button {
cursor: pointer;
    text-align: center;
    font-weight: bold;
    border: 1px solid;
    background: none;
    color: #FFF;
            letter-spacing: 4px;
font-style: italic;
    border-radius: 100px;

    }
    #timer-btn {
    font-size: 24px;
    padding: 16px 32px;

    }

    #form {
width: 300px;
    display: inline-block;
    margin: 80px 0px;
    }

    #form-btn {
    font-size: 16px;
    padding: 16px 32px;
    margin-top: 20px;
    width: 100%;

    }

    input {
      width: 24px;
      height: 24px;
      vertical-align: bottom;
    }

    #settings div {
      margin: 10px;
      text-align: left;
      font-size: 16px;
    }

    a {
      color: #FFF;
    }

        @media (max-width: 640px) {
      #display {
      flex-direction: column;
      }

      #team br {
        display: none;
      }
    }


  </style>
</head>

<body>

  <div id="container">
    <div id="chrono">
      <div id="display">
        <div id="sequence">
          <div id="team"></div>
          <div id="step"></div>
        </div>
        <div id="time"></div>
      <div id="actions">
        <button id="timer-btn" onclick="onToggleChronoButton()"></button>
      </div>
      </div>



    </div>

    <div id="panel">

      <h1 id="title">Chronomètre FFTA 🇫🇷</h1>

      <div id="form">
      <fieldset>
        <legend>COMPÉTITION</legend>
              <select id="modeSelect">
        <option value="0">TAE 6 flèches</option>
        <option value="0">TAI 3 flèches</option>
        <option value="1">MIXTE 4 flèches</option>
        </label>
      </select>
      </fieldset>
      <br>
      <fieldset>
        <legend>TIR</legend>
      <select id="sequenceSelect">
        <option value="SOLO">SEUL</option>
        <option value="ABCD">AB > CD </option>
        <option value="CDAB">CD > AB</option>
        </label>
      </select>
      </fieldset>
      <br>
      <fieldset id="settings">
        <legend>SETTINGS</legend>
        <div>
        <input type="checkbox" id="disable-prepa" name="disable-prepa" />
        <label for="disable-prepa">Désactiver la préparation</label>
        </div>
        <div>
        <input type="checkbox" id="disable-sound" name="disable-sound" />
        <label for="disable-sound">Désactiver le son</label>
        </div>
      </fieldset>
      <br>
            <button id="form-btn" onclick="onResetBtn()">NOUVEAU DÉPART</button>


      </div>




      <div>Made in Paris with ❤️ by <a target="_blank" href="https://www.linkedin.com/in/pravinboolaky/">Pravin Boolaky</a></div>

    </div>


  </div>




  <audio id="beep">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>


  <script>

    const chronoStateReset = 1;
    const chronoStateRunning = 2;
    const chronoStatePaused = 3;
    const chronoStateTimeOut = 4;
    let chronoState = chronoStateReset;

    let interval;
    let selectedMode = null;
    let selectedSequence = null;
    let currentSequenceIndex = 0;

    let modes = [
      { label: "FFTA_6ARROWS", readyTime: 10, shootTime: 240 },
      { label: "FFTA_4ARROWS", readyTime: 10, shootTime: 80 }
    ];

    let timeLeft = 0;

    function refreshDisplay() {

      console.log("updateDisplay");
      let teamHtml = document.getElementById("team");
      let stepHtml = document.getElementById("step");
      let timeHtml = document.getElementById("time");
      let chronoBtnHtml = document.getElementById("timer-btn");

      if (chronoState === chronoStateReset) { // Démarrer
        timeHtml.textContent = selectedSequence[currentSequenceIndex].time;
        teamHtml.innerHTML = selectedSequence[currentSequenceIndex].team;
        stepHtml.textContent = selectedSequence[currentSequenceIndex].step;
        chronoBtnHtml.textContent = "▶️ DÉMARRER";
      }
      else if (chronoState === chronoStatePaused) { // Pause
        timeHtml.textContent = timeLeft;
        teamHtml.innerHTML = selectedSequence[currentSequenceIndex].team;
        stepHtml.textContent = selectedSequence[currentSequenceIndex].step;
        chronoBtnHtml.textContent = "▶️ REPRENDRE ";
      }
      else if (chronoState === chronoStateRunning) { // Continue
        timeHtml.textContent = timeLeft;
        teamHtml.innerHTML = selectedSequence[currentSequenceIndex].team;
        stepHtml.textContent = selectedSequence[currentSequenceIndex].step;
        chronoBtnHtml.textContent = "⏸ PAUSE";
      }
      else if (chronoState === chronoStateTimeOut) { // Relancer
        timeHtml.textContent = "FIN";
        teamHtml.innerHTML = selectedSequence[currentSequenceIndex].team;
        stepHtml.textContent = selectedSequence[currentSequenceIndex].step;
        chronoBtnHtml.textContent = "🔁 RELANCER";
      }
    }



    function runChrono() {

      if (interval) return;

      updateChronoStateTo(chronoStateRunning);
      refreshDisplay();

      interval = setInterval(() => {

        if (timeLeft > 0) {
          timeLeft--;
          updateChronoStateTo(chronoStateRunning);

        } else {

          //document.getElementById("beep").play();


          if (currentSequenceIndex + 1 >= selectedSequence.length) { // end of sequence
            updateChronoStateTo(chronoStateTimeOut);
            destroyInterval();
          } else { // next sequence step
            currentSequenceIndex++;
            timeLeft = selectedSequence[currentSequenceIndex].time;
          }

        }

        refreshDisplay();


      }, 1000);


    }

    function pauseChrono() {
      destroyInterval();
      updateChronoStateTo(chronoStatePaused)
      refreshDisplay();
    }

    function resetChrono() {

      destroyInterval();

      let selectedModeIndex = parseInt(document.getElementById("modeSelect").value);
      let selectedSequenceValue = document.getElementById("sequenceSelect").value;

      selectedMode = modes[selectedModeIndex];
      let readyTime = selectedMode.readyTime;
      let shootTime = selectedMode.shootTime;

      switch (selectedSequenceValue) {
        case "SOLO":
          selectedSequence = [
            { team: "A", step: "PRÉPA", time: readyTime },
            { team: "A", step: "TIR", time: shootTime }
          ]
          break;
        case "ABCD":
          selectedSequence = [
            { team: "A</br>B", step: "PRÉPA", time: readyTime },
            { team: "A</br>B", step: "TIR", time: shootTime },
            { team: "C</br>D", step: "PRÉPA", time: readyTime },
            { team: "C</br>D", step: "TIR", time: shootTime }
          ]
          break;
        case "CDAB":
          selectedSequence = [
            { team: "C</br>D", step: "PRÉPA", time: readyTime },
            { team: "C</br>D", step: "TIR", time: shootTime },
            { team: "A</br>B", step: "PRÉPA", time: readyTime },
            { team: "A</br>B", step: "TIR", time: shootTime }
          ]
          break;
      }

      timeLeft = selectedMode.readyTime;
      currentSequenceIndex = 0;
      updateChronoStateTo(chronoStateReset);
      refreshDisplay();
    }

    function destroyInterval() {
      clearInterval(interval);
      interval = null;
    }


    function updateChronoStateTo(status) {
      chronoState = status;
    }

    function onResetBtn() {
      resetChrono();
    }

    function onToggleChronoButton() {

      if (chronoState === chronoStateReset) { // Démarrer
        runChrono();
      }
      else if (chronoState === chronoStatePaused) { // Continuer
        runChrono();
      }
      else if (chronoState === chronoStateRunning) { // Pause
        pauseChrono();
      }
      else if (chronoState === chronoStateTimeOut) { // Relancer
        resetChrono();
        runChrono();
      }
    }

    resetChrono();

  </script>

</body>

</html>
